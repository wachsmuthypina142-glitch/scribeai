<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribeAI 收藏助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9fafb;
        }
        .container {
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #4f46e5;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .status.loading {
            background: #e0e7ff;
            color: #4338ca;
        }
        .status.success {
            background: #d1fae5;
            color: #059669;
        }
        .status.error {
            background: #fee2e2;
            color: #dc2626;
        }
        .preview {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .preview-title {
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .preview-url {
            font-size: 11px;
            color: #6b7280;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #4f46e5;
            color: white;
        }
        .btn-primary:hover {
            background: #4338ca;
        }
        .btn-primary:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 12px;
        }
        .result-summary {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #374151;
        }
        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .tag {
            padding: 4px 10px;
            background: #e0e7ff;
            color: #4338ca;
            border-radius: 9999px;
            font-size: 12px;
        }
        .history-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: #6b7280;
            font-size: 12px;
            text-decoration: none;
        }
        .history-link:hover {
            color: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ScribeAI 收藏助手</h1>
        </div>

        <div id="status" class="status" style="display: none;"></div>

        <div id="preview" class="preview">
            <div class="preview-title" id="pageTitle">正在获取页面信息...</div>
            <div class="preview-url" id="pageUrl"></div>
        </div>

        <div id="result" class="result" style="display: none;">
            <div id="resultSummary" class="result-summary"></div>
            <div id="resultTags" class="result-tags"></div>
        </div>

        <button id="collectBtn" class="btn btn-primary" disabled>
            一键收藏
        </button>

        <a href="http://localhost:8000/index.html" target="_blank" class="history-link">
            打开 ScribeAI 管理界面 →
        </a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
